services:
  - type: web
    name: optimus-cgm-backend
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /up
    envVars:
      - key: APP_NAME
        value: Optimus CGM
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: LOG_CHANNEL
        value: stderr
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: optimus-cgm-db
          property: connectionString
      - key: DB_URL
        fromDatabase:
          name: optimus-cgm-db
          property: connectionString
      - key: DB_SSLMODE
        value: require
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: RUN_DEMO_SEEDERS
        value: true

databases:
  - name: optimus-cgm-db
    plan: free
    databaseName: optimus_cgm
    user: optimus_cgm
